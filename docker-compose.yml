version: '3.8'

services:
  # Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: jdm-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot_data:/app/bot/data
    networks:
      - jdm-network

  # Client Website (Port 5000)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: jdm-client
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - bot_data:/app/bot/data
    depends_on:
      - bot
    networks:
      - jdm-network

  # Admin/Service Center Website (Port 5001)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: jdm-admin
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - bot_data:/app/bot/data
    depends_on:
      - bot
    networks:
      - jdm-network

volumes:
  bot_data:
    driver: local

networks:
  jdm-network:
    driver: bridge

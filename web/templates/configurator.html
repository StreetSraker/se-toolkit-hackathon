<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator - JDM Config Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚗 Car Configurator</h1>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/configurator" class="nav-link active">Configurator</a>
                <a href="/marketplace" class="nav-link">Marketplace</a>
                <a href="/orders" class="nav-link">Orders</a>
                <a href="/profile" class="nav-link">Profile</a>
                <button onclick="handleLogout()" class="btn btn-secondary btn-small">Logout</button>
            </nav>
        </header>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-step active" data-step="1">
                <div class="step-number">1</div>
                <div class="step-label">Car</div>
            </div>
            <div class="progress-step" data-step="2">
                <div class="step-number">2</div>
                <div class="step-label">Engine</div>
            </div>
            <div class="progress-step" data-step="3">
                <div class="step-number">3</div>
                <div class="step-label">Suspension</div>
            </div>
            <div class="progress-step" data-step="4">
                <div class="step-number">4</div>
                <div class="step-label">Body Kit</div>
            </div>
            <div class="progress-step" data-step="5">
                <div class="step-number">5</div>
                <div class="step-label">Wheels</div>
            </div>
            <div class="progress-step" data-step="6">
                <div class="step-number">6</div>
                <div class="step-label">Summary</div>
            </div>
        </div>

        <!-- Step 1: Car Selection -->
        <div class="config-step-content" id="step1">
            <h2>Select a Car</h2>
            <div class="options-grid options-grid-cars" id="carOptions"></div>
        </div>

        <!-- Step 2: Engine Selection -->
        <div class="config-step-content hidden" id="step2">
            <h2>Select an Engine</h2>
            <div id="selectedCarInfo" class="info-box"></div>
            <div class="options-grid" id="engineOptions"></div>
        </div>

        <!-- Step 3: Suspension Selection -->
        <div class="config-step-content hidden" id="step3">
            <h2>Select Suspension</h2>
            <div id="selectedEngineInfo" class="info-box"></div>
            <div class="options-grid" id="suspensionOptions"></div>
        </div>

        <!-- Step 4: Bodykit Selection -->
        <div class="config-step-content hidden" id="step4">
            <h2>Select Body Kit</h2>
            <div id="selectedSuspensionInfo" class="info-box"></div>
            <div class="options-grid" id="bodykitOptions"></div>
        </div>

        <!-- Step 5: Wheel Selection -->
        <div class="config-step-content hidden" id="step5">
            <h2>Select Wheels</h2>
            <div id="selectedBodykitInfo" class="info-box"></div>
            <div class="options-grid" id="wheelOptions"></div>
        </div>

        <!-- Step 6: Summary -->
        <div class="config-step-content hidden" id="step6">
            <h2>✅ Configuration Complete!</h2>
            <div id="configSummary" class="summary-box"></div>
            <div id="profileContacts" class="summary-box" style="margin-top: 15px; border-color: #4ecdc4;"></div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="submitOrder()">📦 Place Order</button>
                <button class="btn btn-secondary" onclick="restartConfig()">🔄 Start Over</button>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="navigation-buttons" id="navButtons">
            <button class="btn btn-secondary hidden" id="prevBtn" onclick="prevStep()">← Back</button>
        </div>
    </div>

    <!-- Custom Input Modal -->
    <div id="customInputModal" class="modal">
        <div class="modal-content modal-custom-input">
            <h2 id="customInputTitle"></h2>
            <p id="customInputDescription" style="white-space: pre-line; color: #888; margin-bottom: 20px;"></p>
            <input type="text" id="customInputField" class="custom-input-field" placeholder="Type here..." autocomplete="off">
            <div class="custom-input-buttons">
                <button class="btn btn-secondary" id="customInputCancel">Cancel</button>
                <button class="btn btn-primary" id="customInputConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/configurator.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - JDM Config Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 My Orders</h1>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/configurator" class="nav-link">Configurator</a>
                <a href="/marketplace" class="nav-link">Marketplace</a>
                <a href="/orders" class="nav-link active">Orders</a>
                <a href="/profile" class="nav-link">Profile</a>
                <button onclick="handleLogout()" class="btn btn-secondary btn-small">Logout</button>
            </nav>
        </header>

        <div id="ordersList" class="orders-list">
            <p class="loading">Loading orders...</p>
        </div>

        <div class="action-buttons">
            <a href="/configurator" class="btn btn-primary">🚗 Configurator</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/orders.js') }}"></script>
    <script>
        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }
    </script>
</body>
</html>

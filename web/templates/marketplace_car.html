<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car for Sale - JDM Car Configurator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .car-detail-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .image-gallery {
            position: relative;
            margin-bottom: 30px;
        }
        .main-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }
        .main-image-placeholder {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 6em;
        }
        .thumbnail-strip {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .thumbnail {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s;
            flex-shrink: 0;
        }
        .thumbnail:hover, .thumbnail.active {
            border-color: #64748b;
        }
        .car-info {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .car-info h1 {
            margin: 0 0 12px 0;
            color: #1a1a2e;
        }
        .car-price {
            font-size: 2em;
            font-weight: bold;
            color: #64748b;
            margin: 16px 0;
        }
        .car-description {
            color: #495057;
            line-height: 1.7;
            margin: 20px 0;
        }
        .questionnaire-section {
            background: #f8f9fa;
            padding: 24px;
            border-radius: 12px;
            margin: 24px 0;
        }
        .questionnaire-section h3 {
            margin-top: 0;
            color: #1a1a2e;
        }
        .questionnaire-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .questionnaire-item {
            background: white;
            padding: 16px;
            border-radius: 8px;
        }
        .questionnaire-item .label {
            font-size: 0.85em;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .questionnaire-item .value {
            font-weight: 600;
            color: #1a1a2e;
        }
        .mods-list {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 16px;
        }
        .mods-list ul {
            margin: 12px 0 0 0;
            padding-left: 20px;
        }
        .mods-list li {
            margin-bottom: 8px;
            color: #495057;
        }
        .mods-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .mod-card {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #64748b;
        }
        .mod-card h4 {
            margin: 0 0 8px 0;
            color: #64748b;
        }
        .mod-card p {
            margin: 0;
            color: #495057;
            font-size: 0.95em;
        }
        .contact-section {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-top: 30px;
        }
        .contact-section h3 {
            margin: 0 0 16px 0;
        }
        .contact-btn {
            display: inline-block;
            background: white;
            color: #64748b;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            margin-top: 16px;
            transition: transform 0.2s;
        }
        .contact-btn:hover {
            transform: scale(1.05);
        }
        .loading-placeholder {
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚗 Car Details</h1>
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/configurator" class="nav-link">Configurator</a>
                <a href="/marketplace" class="nav-link active">Marketplace</a>
                <a href="/orders" class="nav-link">Orders</a>
            </nav>
        </header>

        <div class="car-detail-container">
            <div id="carDetail">
                <div class="loading-placeholder">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let currentImageIndex = 0;
        let carData = null;

        async function loadCar(carId) {
            try {
                const response = await fetch(`/api/marketplace/${carId}`);
                if (!response.ok) {
                    document.getElementById('carDetail').innerHTML = 
                        '<div class="loading-placeholder">Car not found</div>';
                    return;
                }
                carData = await response.json();
                renderCar(carData);
            } catch (error) {
                console.error('Error loading car:', error);
                document.getElementById('carDetail').innerHTML = 
                    '<div class="loading-placeholder">Loading error</div>';
            }
        }

        function renderCar(car) {
            const container = document.getElementById('carDetail');
            
            const questionnaire = car.questionnaire || {};
            const modsList = questionnaire.mods_list ? questionnaire.mods_list.split('\n').filter(x => x.trim()) : [];
            
            container.innerHTML = `
                <!-- Image Gallery -->
                <div class="image-gallery">
                    ${car.images && car.images.length > 0
                        ? `<img id="mainImage" src="${car.images[0]}" alt="${car.name}" class="main-image">`
                        : `<div class="main-image-placeholder">🚗</div>`
                    }
                    ${car.images && car.images.length > 1
                        ? `<div class="thumbnail-strip">
                            ${car.images.map((img, idx) => 
                                `<img src="${img}" class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="switchImage(${idx})">`
                            ).join('')}
                           </div>`
                        : ''
                    }
                </div>

                <!-- Car Info -->
                <div class="car-info">
                    <h1>${car.name}</h1>
                    <div class="car-price">${car.price || 'By arrangement'}</div>
                    <p class="car-description">${car.description || 'No description available'}</p>
                </div>

                <!-- Questionnaire -->
                ${Object.keys(questionnaire).length > 0 ? `
                <div class="car-info">
                    <h3>📋 Questionnaire</h3>
                    <div class="questionnaire-section" style="margin: 0; background: transparent; padding: 0;">
                        <div class="questionnaire-grid">
                            ${questionnaire.mileage ? `
                            <div class="questionnaire-item">
                                <div class="label">Mileage</div>
                                <div class="value">${questionnaire.mileage} km</div>
                            </div>` : ''}
                            ${questionnaire.year ? `
                            <div class="questionnaire-item">
                                <div class="label">Year</div>
                                <div class="value">${questionnaire.year}</div>
                            </div>` : ''}
                            ${questionnaire.condition ? `
                            <div class="questionnaire-item">
                                <div class="label">Condition</div>
                                <div class="value">${getConditionText(questionnaire.condition)}</div>
                            </div>` : ''}
                            ${questionnaire.documents ? `
                            <div class="questionnaire-item">
                                <div class="label">Documents</div>
                                <div class="value">${questionnaire.documents}</div>
                            </div>` : ''}
                            ${questionnaire.location ? `
                            <div class="questionnaire-item">
                                <div class="label">Location</div>
                                <div class="value">📍 ${questionnaire.location}</div>
                            </div>` : ''}
                            ${questionnaire.contact ? `
                            <div class="questionnaire-item">
                                <div class="label">Contact</div>
                                <div class="value">${questionnaire.contact}</div>
                            </div>` : ''}
                        </div>
                        ${modsList.length > 0 ? `
                        <div class="mods-list">
                            <h4>🔧 Modifications List</h4>
                            <ul>
                                ${modsList.map(mod => `<li>${mod}</li>`).join('')}
                            </ul>
                        </div>` : ''}
                    </div>
                </div>` : ''}

                <!-- Modifications -->
                ${(car.engine || car.suspension || car.bodykit || car.wheels) ? `
                <div class="car-info">
                    <h3>🛠️ Modifications</h3>
                    <div class="mods-section">
                        ${car.engine && car.engine.id ? `
                        <div class="mod-card">
                            <h4>Engine</h4>
                            <p>${car.engine.name || car.engine.id}</p>
                        </div>` : ''}
                        ${car.suspension && car.suspension.id ? `
                        <div class="mod-card">
                            <h4>Suspension</h4>
                            <p>${car.suspension.name || car.suspension.id}</p>
                        </div>` : ''}
                        ${car.bodykit && car.bodykit.id ? `
                        <div class="mod-card">
                            <h4>Body Kit</h4>
                            <p>${car.bodykit.name || car.bodykit.id}</p>
                        </div>` : ''}
                        ${car.wheels && car.wheels.id ? `
                        <div class="mod-card">
                            <h4>Wheels</h4>
                            <p>${car.wheels.name || car.wheels.id}</p>
                        </div>` : ''}
                    </div>
                </div>` : ''}

                <!-- Contact -->
                <div class="contact-section">
                    <h3>Interested in this car?</h3>
                    <p>Contact us for more information or to schedule a viewing</p>
                    <a href="https://t.me/your_bot_username" class="contact-btn" target="_blank">
                        💬 Message on Telegram
                    </a>
                </div>
            `;
        }

        function switchImage(index) {
            if (!carData || !carData.images) return;
            currentImageIndex = index;
            document.getElementById('mainImage').src = carData.images[index];
            document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
                thumb.classList.toggle('active', idx === index);
            });
        }

        function getConditionText(condition) {
            const conditions = {
                'excellent': 'Excellent',
                'good': 'Good',
                'fair': 'Fair',
                'project': 'Project'
            };
            return conditions[condition] || condition;
        }

        // Load car on page load
        const carId = {{ car_id | tojson }};
        loadCar(carId);
    </script>
</body>
</html>

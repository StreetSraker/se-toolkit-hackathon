<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg_preset_drift_supra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#4a1a1a"/>
    </linearGradient>
    <filter id="shadow_preset_drift_supra">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg_preset_drift_supra)"/>

  <!-- Decorative racing stripes -->
  <rect x="0" y="520" width="800" height="8" fill="rgba(255,255,255,0.1)"/>
  <rect x="0" y="540" width="800" height="4" fill="rgba(255,255,255,0.05)"/>

  <!-- Car emoji -->
  <text x="400" y="220" font-family="Arial" font-size="100" text-anchor="middle" filter="url(#shadow_preset_drift_supra)">🏎️</text>

  <!-- Car name -->
  <text x="400" y="320" font-family="Arial" font-size="42" font-weight="bold" text-anchor="middle" fill="rgba(255,255,255,0.95)" filter="url(#shadow_preset_drift_supra)">Toyota Supra</text>

  <!-- Build name / HP -->
  <text x="400" y="380" font-family="Arial" font-size="30" text-anchor="middle" fill="rgba(255,255,255,0.8)">Drift King — 700 HP</text>

  <!-- Tag badge -->
  <rect x="340" y="420" width="120" height="36" rx="18" fill="#e94560" opacity="0.9"/>
  <text x="400" y="445" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">drift</text>

  <!-- Bottom accent line -->
  <rect x="300" y="500" width="200" height="3" rx="1" fill="#e94560" opacity="0.6"/>
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - JDM Service Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 Order Management</h1>
            <nav class="admin-nav">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/orders" class="nav-link active">Orders</a>
                <a href="/for-sale" class="nav-link">Car Sales</a>
                <a href="/stats" class="nav-link">Statistics</a>
                <a href="/services" class="nav-link">Services</a>
                <a href="/profile" class="nav-link">Profile</a>
                <button class="btn btn-secondary btn-small" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <!-- Service Info Banner -->
        <div id="serviceInfo" class="service-info-banner" style="display: none;">
            <span class="service-info-icon">🔧</span>
            <span class="service-info-text">Logged in as: <strong id="serviceName"></strong></span>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="btn btn-filter active" onclick="filterOrders('all')">All Orders</button>
            <button class="btn btn-filter" onclick="filterOrders('new')">🆕 New</button>
            <button class="btn btn-filter" onclick="filterOrders('in_progress')">🔧 In Progress</button>
            <button class="btn btn-filter" onclick="filterOrders('completed')">✅ Completed</button>
            <button class="btn btn-filter" onclick="filterOrders('cancelled')">❌ Cancelled</button>
            <button class="btn btn-filter" id="myOrdersBtn" onclick="filterOrders('my')" style="display: none;">📦 My Orders</button>
        </div>

        <!-- Orders List -->
        <div id="adminOrdersList" class="admin-orders-list">
            <p class="loading">Loading orders...</p>
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content modal-large">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="orderDetail"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_orders.js') }}"></script>
</body>
</html>

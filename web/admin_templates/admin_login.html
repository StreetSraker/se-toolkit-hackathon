<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JDM Service Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-form {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .login-form h2 {
            margin-top: 0;
            text-align: center;
        }
        .login-form .form-group {
            margin-bottom: 16px;
        }
        .login-form .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }
        .login-form .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .login-form button[type="submit"] {
            width: 100%;
            margin-top: 10px;
        }
        .login-form .register-link {
            text-align: center;
            margin-top: 16px;
            color: #666;
        }
        .login-form .register-link a {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }
        .login-form .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 Service Panel</h1>
            <p class="subtitle">JDM Config Order Management System</p>
        </header>

        <!-- Login Form -->
        <div id="serviceLogin" class="login-form">
            <h2>🔐 Service Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="input-field" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginError" class="error-message hidden"></p>
            </form>
            <p class="register-link">
                Don't have an account? <a href="/register">Register here</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_auth.js') }}"></script>
</body>
</html>

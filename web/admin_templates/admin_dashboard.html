<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд - Панель сервиса JDM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 Панель сервиса</h1>
            <nav class="admin-nav">
                <a href="/dashboard" class="nav-link active">Дашборд</a>
                <a href="/orders" class="nav-link">Заказы</a>
                <a href="/stats" class="nav-link">Статистика</a>
                <button class="btn btn-secondary btn-small" onclick="handleLogout()">Выйти</button>
            </nav>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
            <div class="stat-card stat-new">
                <div class="stat-number" id="statNew">0</div>
                <div class="stat-label">🆕 Новые</div>
            </div>
            <div class="stat-card stat-progress">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔧 В работе</div>
            </div>
            <div class="stat-card stat-completed">
                <div class="stat-number" id="statCompleted">0</div>
                <div class="stat-label">✅ Выполнены</div>
            </div>
            <div class="stat-card stat-cancelled">
                <div class="stat-number" id="statCancelled">0</div>
                <div class="stat-label">❌ Отменены</div>
            </div>
        </div>

        <!-- Recent Orders -->
        <h2 style="margin: 30px 0 20px; color: #ff6b6b;">📋 Последние заказы</h2>
        <div id="recentOrders" class="orders-list">
            <p class="loading">Загрузка...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_dashboard.js') }}"></script>
</body>
</html>

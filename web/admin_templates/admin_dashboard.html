<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JDM Service Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 Service Panel</h1>
            <nav class="admin-nav">
                <a href="/dashboard" class="nav-link active">Dashboard</a>
                <a href="/orders" class="nav-link">Orders</a>
                <a href="/for-sale" class="nav-link">Car Sales</a>
                <a href="/stats" class="nav-link">Statistics</a>
                <a href="/services" class="nav-link">Services</a>
                <a href="/profile" class="nav-link">Profile</a>
                <button class="btn btn-secondary btn-small" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total orders</div>
            </div>
            <div class="stat-card stat-new">
                <div class="stat-number" id="statNew">0</div>
                <div class="stat-label">🆕 New</div>
            </div>
            <div class="stat-card stat-progress">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔧 In Progress</div>
            </div>
            <div class="stat-card stat-completed">
                <div class="stat-number" id="statCompleted">0</div>
                <div class="stat-label">✅ Completed</div>
            </div>
            <div class="stat-card stat-cancelled">
                <div class="stat-number" id="statCancelled">0</div>
                <div class="stat-label">❌ Cancelled</div>
            </div>
        </div>

        <!-- Recent Orders -->
        <h2 style="margin: 30px 0 20px; color: #64748b;">📋 Recent Orders</h2>
        <div id="recentOrders" class="orders-list">
            <p class="loading">Loading...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin_dashboard.js') }}"></script>
</body>
</html>

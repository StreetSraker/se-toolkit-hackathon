<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - JDM Service Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔧 Service Panel</h1>
            <nav class="admin-nav">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/orders" class="nav-link">Orders</a>
                <a href="/for-sale" class="nav-link">Car Sales</a>
                <a href="/stats" class="nav-link">Statistics</a>
                <a href="/services" class="nav-link">Services</a>
                <a href="/profile" class="nav-link active">Profile</a>
                <button class="btn btn-secondary btn-small" onclick="handleLogout()">Logout</button>
            </nav>
        </header>

        <div class="login-form" style="max-width: 500px;">
            <h2>👤 My Service Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Service Display Name *</label>
                    <input type="text" id="name" class="input-field" placeholder="e.g. Mike's Garage" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="input-field" disabled style="background: #f5f5f5; cursor: not-allowed;">
                    <small style="color: #888; display: block; margin-top: 4px;">Username cannot be changed.</small>
                </div>
                <div class="form-group">
                    <label for="password">
                        <span class="label-icon">🔒</span>
                        New Password
                    </label>
                    <input type="password" id="password" class="input-field" placeholder="Leave blank to keep current">
                    <small style="color: #888; display: block; margin-top: 4px;">Minimum 4 characters. Leave blank to keep current password.</small>
                </div>
                <div class="form-group">
                    <label for="telegram_username">
                        <span class="label-icon">💬</span>
                        Telegram Username
                    </label>
                    <input type="text" id="telegram_username" class="input-field" placeholder="@your_username">
                </div>
                <div class="form-group">
                    <label for="phone">
                        <span class="label-icon">📱</span>
                        Phone Number
                    </label>
                    <input type="tel" id="phone" class="input-field" placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label for="specialties">
                        <span class="label-icon">🔧</span>
                        Specialties (comma-separated)
                    </label>
                    <input type="text" id="specialties" class="input-field" placeholder="engine, suspension, bodykit">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
                <div id="profileSuccess" class="success-message" style="display: none;"></div>
                <div id="profileError" class="error-message" style="display: none;"></div>
            </form>
        </div>
    </div>

    <style>
        .success-message {
            color: #155724;
            background: #d4edda;
            padding: 10px;
            border-radius: 6px;
            margin-top: 12px;
            text-align: center;
        }
        .error-message {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 6px;
            margin-top: 12px;
            text-align: center;
        }
    </style>

    <script>
        let currentService = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await loadProfile();
        });

        async function loadProfile() {
            try {
                const response = await fetch('/api/service/profile');
                if (response.ok) {
                    currentService = await response.json();
                    document.getElementById('name').value = currentService.name || '';
                    document.getElementById('username').value = currentService.username || '';
                    document.getElementById('telegram_username').value = currentService.telegram_username || '';
                    document.getElementById('phone').value = currentService.phone || '';
                    // Convert specialties array to comma-separated string
                    const specialties = currentService.specialties || [];
                    document.getElementById('specialties').value = Array.isArray(specialties) ? specialties.join(', ') : specialties;
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value;
            const telegramUsername = document.getElementById('telegram_username').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const specialtiesStr = document.getElementById('specialties').value.trim();

            const errorEl = document.getElementById('profileError');
            const successEl = document.getElementById('profileSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name) {
                errorEl.textContent = '❌ Display name is required';
                errorEl.style.display = 'block';
                return;
            }

            const updateData = {
                name,
                telegram_username: telegramUsername,
                phone,
            };

            // Convert specialties string to array
            if (specialtiesStr) {
                updateData.specialties = specialtiesStr.split(',').map(s => s.trim()).filter(s => s);
            } else {
                updateData.specialties = [];
            }

            if (password) {
                if (password.length < 4) {
                    errorEl.textContent = '❌ Password must be at least 4 characters';
                    errorEl.style.display = 'block';
                    return;
                }
                updateData.password = password;
            }

            try {
                const response = await fetch('/api/service/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();

                if (response.ok) {
                    successEl.textContent = '✅ Profile updated successfully!';
                    successEl.style.display = 'block';
                    document.getElementById('password').value = '';
                    // Reload profile to get updated data
                    await loadProfile();
                } else {
                    errorEl.textContent = '❌ ' + (data.error || 'Failed to update profile');
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = '❌ Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        });

        async function handleLogout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }
    </script>
</body>
</html>
